# Build and test the Melt language (C++ interpreter)
# Uses Makefile; runs on Linux and macOS with GCC and Clang.
# NOTE: This workflow does NOT use actions/checkout so submodules are never fetched.
name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    steps:
      # Do NOT use actions/checkout here — it would fetch submodules and fail.
      # Manual clone fetches only the main repo at the triggering commit.
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Build (Make)
        run: make ci CXX=${{ matrix.cxx }}
        env:
          # Ensure no MySQL linkage so the binary runs on runners without libmysqlclient.
          MYSQL_CFLAGS: ""
          MYSQL_LIBS: ""

      - name: Test — run built-in demo (no args)
        run: ./bin/melt

      - name: Test — run example.melt
        run: ./bin/melt example.melt

      - name: Test — run example_oop.melt
        run: ./bin/melt example_oop.melt

      - name: Set binary artifact name
        id: artifact
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) echo "name=melt-linux-x86_64-${{ matrix.cxx }}" >> "$GITHUB_OUTPUT" ;;
            macos-latest)  echo "name=melt-darwin-$(uname -m)-${{ matrix.cxx }}" >> "$GITHUB_OUTPUT" ;;
            *)            echo "name=melt-${{ matrix.os }}-${{ matrix.cxx }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: bin/
          retention-days: 30
