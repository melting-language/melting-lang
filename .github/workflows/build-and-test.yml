# Build and test the Melt language (C++ interpreter)
# Uses Makefile; runs on Linux and macOS with GCC and Clang.
name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    steps:
      # Manual clone without submodules so CI doesn't fail when submodule refs
      # are missing (e.g. "not our ref" after history rewrite in submodule repo).
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          git clone --no-recurse-submodules "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" .
          git fetch origin "${{ github.sha }}"
          git -c advice.detachedHead=false checkout "${{ github.sha }}"

      - name: Build (Make)
        run: make ci CXX=${{ matrix.cxx }}
        env:
          # Ensure no MySQL linkage so the binary runs on runners without libmysqlclient.
          MYSQL_CFLAGS: ""
          MYSQL_LIBS: ""

      - name: Test — run built-in demo (no args)
        run: ./bin/melt

      - name: Test — run example.melt
        run: ./bin/melt example.melt

      - name: Test — run example_oop.melt
        run: ./bin/melt example_oop.melt
