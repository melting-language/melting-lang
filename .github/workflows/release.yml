# Build and publish release binaries and Debian package when you push a version tag (e.g. v1.0.0).
# Binaries are attached to the GitHub Release under the "bin" naming pattern; .deb under "dist".
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
            artifact_name: melt-linux-x86_64
          - os: macos-latest
            cxx: clang++
            artifact_name: melt-darwin-arm64

    steps:
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config \
            libsdl2-dev libsqlite3-dev libqrencode-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake pkg-config sdl2 sqlite qrencode

      - name: Build (CMake)
        run: |
          cmake -B build -DUSE_MYSQL=OFF -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          cmake --build build

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Set up MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make zip

      - name: Build (Makefile.win)
        run: make -f Makefile.win
        shell: msys2 {0}

      - name: Install zip (for packaging)
        run: pacman -S --noconfirm zip
        shell: msys2 {0}

      - name: Create zip with exe + DLLs
        run: |
          PACKAGE=melt-windows-x86_64
          mkdir -p "$PACKAGE"
          cp bin/melt.exe "$PACKAGE/"
          # Copy MinGW runtime DLLs required at runtime (no install needed)
          MINGW_BIN="${MINGW_PREFIX:-/mingw64}/bin"
          cp "$MINGW_BIN/libwinpthread-1.dll" "$MINGW_BIN/libgcc_s_seh-1.dll" "$MINGW_BIN/libstdc++-6.dll" "$PACKAGE/" 2>/dev/null || true
          zip -r "$PACKAGE.zip" "$PACKAGE"
          ls -la "$PACKAGE" "$PACKAGE.zip"
        shell: msys2 {0}

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: melt-windows-x86_64
          path: melt-windows-x86_64.zip

  debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Set package version from tag
        id: version
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          VERSION="${VERSION#.}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Update debian/changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "1s/([^)]*)/(${VERSION})/" debian/changelog
          head -1 debian/changelog

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper build-essential cmake pkg-config \
            libsdl2-dev libsqlite3-dev libqrencode-dev

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Copy .deb into workspace
        run: |
          mkdir -p dist
          cp ../meltlang_*_amd64.deb dist/

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: dist/*.deb

  release:
    needs: [build, build-windows, debian]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bin

      - name: Prepare bin directory for release
        run: |
          mkdir -p bin dist
          for dir in release-bin/*/; do
            name=$(basename "$dir")
            if [ -f "${dir}melt" ]; then
              cp "${dir}melt" "bin/${name}"
              chmod +x "bin/${name}"
              echo "Added bin/${name}"
            fi
            if [ -f "${dir}melt.exe" ]; then
              cp "${dir}melt.exe" "bin/${name}.exe"
              echo "Added bin/${name}.exe"
            fi
            if [ -d "${dir}" ] && ls "${dir}"/*.zip 1>/dev/null 2>&1; then
              cp "${dir}"/*.zip dist/
              echo "Added dist/*.zip"
            fi
            if [ -d "${dir}" ] && ls "${dir}"/*.deb 1>/dev/null 2>&1; then
              cp "${dir}"/*.deb dist/
              echo "Added dist/*.deb"
            fi
          done
          ls -la bin/ dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            bin/*
            dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
