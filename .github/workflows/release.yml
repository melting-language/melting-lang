# Build and publish release binaries and Debian package when you push a version tag (e.g. v1.0.0).
# Binaries are attached to the GitHub Release under the "bin" naming pattern; .deb under "dist".
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
            artifact_name: melt-linux-x86_64
          - os: macos-latest
            cxx: clang++
            artifact_name: melt-darwin-arm64

    steps:
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Build (Make)
        run: make ci CXX=${{ matrix.cxx }}
        env:
          MYSQL_CFLAGS: ""
          MYSQL_LIBS: ""

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/melt

  debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (no submodules)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}":refs/heads/ci
          git checkout ci

      - name: Set package version from tag
        id: version
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Update debian/changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "1s/([^)]*)/(${VERSION})/" debian/changelog
          head -1 debian/changelog

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper build-essential

      - name: Build Debian package
        env:
          MYSQL_CFLAGS: ""
          MYSQL_LIBS: ""
        run: |
          dpkg-buildpackage -us -uc -b -d

      - name: Copy .deb into workspace
        run: |
          mkdir -p dist
          cp ../meltlang_*_amd64.deb dist/

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: dist/*.deb

  release:
    needs: [build, debian]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bin

      - name: Prepare bin directory for release
        run: |
          mkdir -p bin dist
          for dir in release-bin/*/; do
            name=$(basename "$dir")
            if [ -f "${dir}melt" ]; then
              cp "${dir}melt" "bin/${name}"
              chmod +x "bin/${name}"
              echo "Added bin/${name}"
            fi
            if [ -d "${dir}" ] && ls "${dir}"/*.deb 1>/dev/null 2>&1; then
              cp "${dir}"/*.deb dist/
              echo "Added dist/*.deb"
            fi
          done
          ls -la bin/ dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: bin/* dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
