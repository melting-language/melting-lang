# Melt global config (php.ini-style). Read from the directory containing the melt binary.
# modulePath = dirs relative to bin (for import "name" search)
# extension_enabled = 1|0|true|false|on|off  -- enable/disable loading extensions (default: on)
# extension_dir = dir relative to bin for loadable extensions (default: modules)
# extension = comma-separated list of extension names to load (e.g. math, image)
extension_enabled = 0
extension_dir = modules
extension = example
